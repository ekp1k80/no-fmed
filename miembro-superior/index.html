<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cintura Pectoral - Labeling Quiz</title>

<style>

  *{margin:0;padding:0;box-sizing:border-box}

  body{font-family:'Segoe UI',system-ui,sans-serif;background:#121220;color:#e0e0e0;min-height:100vh;padding:16px}

  h1{text-align:center;font-size:1.5rem;margin-bottom:4px}

  .sub{text-align:center;color:#666;font-size:.85rem;margin-bottom:10px}

  .modes{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}

  .modes button{padding:6px 16px;border-radius:8px;font-size:.8rem;border:2px solid #3a3a5a;background:#1a1a2e;color:#bbb;cursor:pointer;transition:all .15s}

  .modes button:hover{border-color:#7b68ee;color:#fff}

  .modes button.on{background:#7b68ee;border-color:#7b68ee;color:#fff}

  .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}

  .tab{padding:8px 16px;border:2px solid #3a3a5a;background:transparent;color:#bbb;border-radius:10px;cursor:pointer;font-size:.88rem;transition:all .2s}

  .tab:hover{border-color:#7b68ee;color:#fff}

  .tab.on{background:#7b68ee;border-color:#7b68ee;color:#fff}

  .main{display:flex;gap:24px;max-width:1200px;margin:0 auto;align-items:flex-start}

  .canvas{position:relative;flex:1;min-width:0;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.5);background:#fff;overflow:visible}

  .canvas img{display:block;width:100%;height:auto;border-radius:14px}



  /* === DRAG MODE === */

  .dz{position:absolute;border:2px dashed rgba(123,104,238,.6);border-radius:8px;background:rgba(18,18,32,.85);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:rgba(255,255,255,.85);transition:all .15s;text-align:center;padding:3px 5px;transform:translate(-50%,-50%);z-index:10;backdrop-filter:blur(2px);line-height:1.15;cursor:grab;white-space:normal;word-wrap:break-word}

  .dz::after{content:'';position:absolute;inset:-12px;border-radius:12px}

  .dz:hover{border-color:#7b68ee;background:rgba(123,104,238,.3);color:#fff;z-index:11;transform:translate(-50%,-50%) scale(1.04)}

  .dz.over{border-color:#4ade80;background:rgba(74,222,128,.3);color:#4ade80;transform:translate(-50%,-50%) scale(1.06)}

  .dz.ok{border-style:solid;border-color:#4ade80;background:rgba(74,222,128,.4);color:#fff;font-weight:700;cursor:default;pointer-events:none}

  .dz.wrong{border-color:#ef4444;background:rgba(239,68,68,.35);animation:shk .35s}

  @keyframes shk{0%,100%{transform:translate(-50%,-50%)}20%{transform:translate(calc(-50%+6px),-50%)}40%{transform:translate(calc(-50%-6px),-50%)}60%{transform:translate(calc(-50%+4px),-50%)}80%{transform:translate(calc(-50%-4px),-50%)}}



  /* === ZONE WRAPPER + ARROW + BOX === */
  .zone-wrap{position:absolute;transform:translate(-50%,-50%);z-index:10;pointer-events:none;width:200px;height:200px}
  .mq-zone{position:relative;z-index:10}
  .zone-box,.mq-zone-label{position:relative;z-index:12;display:flex;align-items:center;justify-content:center;min-width:90px;min-height:28px;border:none;border-radius:8px;background:rgba(18,18,32,.9);color:rgba(255,255,255,.9);font-size:.65rem;font-weight:600;pointer-events:auto;white-space:normal;word-wrap:break-word;padding:2px 6px;cursor:grab}
  /* Arrow tip at wrapper center (100px,100px relative to box) */
  .zone-box::after,.mq-zone-label::after{content:'';position:absolute;z-index:12;width:0;height:0;border:5px solid transparent}
  .zone-box.correct{border-color:#10b981;background:rgba(16,185,129,.2);cursor:default}
  .zone-box.wrong{border-color:#ef4444;animation:shk .4s}

  /* RIGHT: box on left side, arrow tip on right pointing right */
  .zone-wrap.arr-r .zone-box,.mq-zone.arr-r .zone-box{left:0;top:50%;transform:translate(0,-50%)}
  .zone-wrap.arr-r .zone-box::after,.mq-zone.arr-r .zone-box::after{left:100%;top:50%;transform:translate(0,-50%);border-left:8px solid rgba(18,18,32,.9)}

  /* LEFT: box on right side, arrow tip on left pointing left */
  .zone-wrap.arr-l .zone-box,.mq-zone.arr-l .zone-box{right:0;top:50%;transform:translate(0,-50%)}
  .zone-wrap.arr-l .zone-box::after,.mq-zone.arr-l .zone-box::after{right:100%;top:50%;transform:translate(0,-50%);border-right:8px solid rgba(18,18,32,.9)}

  /* UP: box below, arrow tip on top pointing up */
  .zone-wrap.arr-u .zone-box,.mq-zone.arr-u .zone-box{left:50%;bottom:0;transform:translate(-50%,0)}
  .zone-wrap.arr-u .zone-box::after,.mq-zone.arr-u .zone-box::after{left:50%;bottom:100%;transform:translateX(-50%);border-bottom:8px solid rgba(18,18,32,.9)}

  /* DOWN: box above, arrow tip on bottom pointing down */
  .zone-wrap.arr-d .zone-box,.mq-zone.arr-d .zone-box{left:50%;top:0;transform:translate(-50%,0)}
  .zone-wrap.arr-d .zone-box::after,.mq-zone.arr-d .zone-box::after{left:50%;top:100%;transform:translateX(-50%);border-top:8px solid rgba(18,18,32,.9)}

  /* TOP-RIGHT */
  .zone-wrap.arr-tr .zone-box,.mq-zone.arr-tr .zone-box{right:0;bottom:0}
  .zone-wrap.arr-tr .zone-box::after,.mq-zone.arr-tr .zone-box::after{right:100%;bottom:100%;border-right:8px solid rgba(18,18,32,.9);border-top:5px solid transparent;border-bottom:5px solid transparent}

  /* TOP-LEFT */
  .zone-wrap.arr-tl .zone-box,.mq-zone.arr-tl .zone-box{left:0;bottom:0}
  .zone-wrap.arr-tl .zone-box::after,.mq-zone.arr-tl .zone-box::after{left:100%;bottom:100%;border-left:8px solid rgba(18,18,32,.9);border-top:5px solid transparent;border-bottom:5px solid transparent}

  /* BOTTOM-RIGHT */
  .zone-wrap.arr-br .zone-box,.mq-zone.arr-br .zone-box{right:0;top:0}
  .zone-wrap.arr-br .zone-box::after,.mq-zone.arr-br .zone-box::after{right:100%;top:100%;border-right:8px solid rgba(18,18,32,.9);border-bottom:5px solid transparent;border-top:5px solid transparent}

  /* BOTTOM-LEFT */
  .zone-wrap.arr-bl .zone-box,.mq-zone.arr-bl .zone-box{left:0;top:0}
  .zone-wrap.arr-bl .zone-box::after,.mq-zone.arr-bl .zone-box::after{left:100%;top:100%;border-left:8px solid rgba(18,18,32,.9);border-bottom:5px solid transparent;border-top:5px solid transparent}

/* NONE */
  .zone-wrap.arr-none .zone-box::after,.mq-zone.arr-none .zone-box::after{display:none}


/* === DROPDOWN MODE === */

  .dz-dd{transform:translate(-50%,-50%);z-index:10;text-align:center;position:absolute;display:inline-block}

  .dz-dd .zone-label{display:inline-block;padding:6px 10px;border:2px solid rgba(123,104,238,.6);border-radius:8px;background:rgba(18,18,32,.85);color:rgba(255,255,255,.7);font-size:.55rem;cursor:pointer;transition:all .15s;white-space:nowrap;backdrop-filter:blur(2px);min-width:80px}

  .dz-dd .zone-label:hover{border-color:#7b68ee;color:#fff;background:rgba(123,104,238,.2)}

  .dz-dd.ok .zone-label{border-color:#4ade80;border-style:solid;background:rgba(74,222,128,.4);color:#fff;font-weight:700;cursor:default;pointer-events:none}

  .dz-dd.wrong .zone-label{border-color:#ef4444;background:rgba(239,68,68,.35);animation:shk2 .4s}

  @keyframes shk2{0%,100%{transform:translateX(0)}25%{transform:translateX(5px)}75%{transform:translateX(-5px)}}



  .dropdown{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1a1a2e;border:2px solid rgba(18,18,32,.9);border-radius:10px;min-width:220px;max-height:200px;overflow-y:auto;z-index:20;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6)}

  .dropdown.open{display:block}

  .dropdown input{width:100%;padding:8px 12px;border:none;border-bottom:1px solid #3a3a5a;background:#22224a;color:#e0e0e0;font-size:.82rem;outline:none;border-radius:10px 10px 0 0}

  .dropdown input::placeholder{color:#555}

  .dropdown .opts{padding:4px 0}

  .dropdown .opt{padding:6px 12px;cursor:pointer;font-size:.8rem;color:#ccc;transition:background .1s}

  .dropdown .opt:hover{background:#7b68ee;color:#fff}

  .dropdown .opt.hidden{display:none}

  .dropdown .opt .match{color:#4ade80;font-weight:600}

  .dropdown .no-match{padding:8px 12px;color:#555;font-size:.75rem;font-style:italic}



  /* === Word bank (drag mode) === */

  .bank{width:240px;flex-shrink:0;max-height:80vh;overflow-y:auto}

  .bank h3{font-size:.95rem;margin-bottom:12px;color:#7b68ee}

  .wl{display:flex;flex-direction:column;gap:7px}

  .bank::-webkit-scrollbar{width:4px}

  .bank::-webkit-scrollbar-thumb{background:#3a3a5a;border-radius:4px}

  .w{padding:10px 14px;background:#1a1a2e;border:2px solid #3a3a5a;border-radius:10px;cursor:grab;font-size:.82rem;transition:all .15s;user-select:none}

  .w:hover{border-color:#7b68ee;background:#22224a;transform:translateX(3px)}

  .w.drg{opacity:.4;transform:scale(.95)}

  .w.used{opacity:.2;pointer-events:none;border-color:#2a2a3a;text-decoration:line-through}



  .bot{text-align:center;margin-top:16px}

  .sc{font-size:.9rem;color:#666;margin-bottom:10px}.sc b{color:#4ade80}

  .rst{padding:8px 22px;border:2px solid #6a2a2a;background:transparent;color:#ccc;border-radius:10px;cursor:pointer;font-size:.85rem}

  .rst:hover{border-color:#ef4444;color:#ef4444}

  .msg{text-align:center;color:#555;font-size:.75rem;margin-top:8px}


  .fuzzy-hint{text-align:center;color:#555;font-size:.7rem;margin-top:4px}



  /* Mobile Sequential Quiz */

  .mobile-quiz{display:none;flex-direction:column;align-items:center;gap:10px;padding:8px 0}

  .mobile-quiz .mq-header{font-size:.9rem;color:#888;text-align:center}
  .mq-view-picker{display:flex;align-items:center;gap:8px;justify-content:center;width:100%;padding:4px 0}
  .mq-view-picker button{width:36px;height:36px;border-radius:50%;border:2px solid #3a3a5a;background:#1a1a2e;color:#7b68ee;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .mq-view-picker button:active{background:#7b68ee;color:#fff}
  .mq-view-picker .mq-view-name{font-size:.8rem;color:#bbb;min-width:100px;text-align:center;white-space:nowrap}

  .mobile-quiz .mq-header b{color:#7b68ee}

  .mobile-quiz .img-wrap{position:relative;width:100%;max-width:380px;aspect-ratio:1/1;background:#fff;border-radius:12px;overflow:visible}

  .mobile-quiz .img-wrap img{width:100%;height:100%;object-fit:contain}

  .mobile-quiz .mq-zone{position:absolute;transform:translate(-50%,-50%);z-index:10;overflow:visible}

  .mobile-quiz .mq-zone-label{display:flex;align-items:center;justify-content:center;width:100%;height:100%;border:none;border-radius:8px;background:rgba(18,18,32,.9);color:rgba(255,255,255,.9);font-size:.7rem;font-weight:600;min-width:90px;min-height:28px;backdrop-filter:blur(2px)}

  .mobile-quiz .mq-dropdown{width:100%;max-width:320px}

  .mobile-quiz .mq-dropdown input{width:100%;padding:10px 14px;border-radius:10px;border:2px solid #3a3a5a;background:#1a1a2e;color:#e0e0e0;font-size:1rem;outline:none}

  .mobile-quiz .mq-dropdown input:focus{border-color:#7b68ee}

  .mobile-quiz .mq-opts{width:100%;max-width:320px;max-height:180px;overflow-y:auto;border-radius:10px;background:#1a1a2e;border:1px solid #2a2a4a}

  .mobile-quiz .mq-opt{padding:10px 14px;font-size:.85rem;color:#ccc;cursor:pointer;border-bottom:1px solid #2a2a3a}

  .mobile-quiz .mq-opt:hover,.mobile-quiz .mq-opt:active{background:#7b68ee;color:#fff}

  .mobile-quiz .mq-opt.hidden{display:none}

  .mobile-quiz .mq-opt .match{color:#4ade80;font-weight:600}

  .mobile-quiz .mq-score{font-size:.9rem;color:#666}

  .mobile-quiz .mq-score b{color:#4ade80}

  .mobile-quiz .mq-feedback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;font-weight:700;border-radius:12px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:20}

  .mobile-quiz .mq-feedback.show{opacity:1}

  .mobile-quiz .mq-feedback.correct{background:rgba(74,222,128,.2);color:#4ade80}

  .mobile-quiz .mq-feedback.wrong{background:rgba(239,68,68,.2);color:#ef4444}

  .mobile-quiz .mq-no-match{text-align:center;color:#555;font-size:.7rem;padding:2px}

  .mobile-quiz .mq-complete{text-align:center;padding:30px 16px}

  .mobile-quiz .mq-complete h2{font-size:1.5rem;color:#4ade80;margin-bottom:8px}

  .mobile-quiz .mq-complete p{color:#888;margin-bottom:16px}

  .mobile-quiz .mq-restart{padding:10px 24px;border-radius:10px;border:2px solid rgba(18,18,32,.9);background:#7b68ee;color:#fff;font-size:.9rem;cursor:pointer}

  .mobile-quiz .mq-skip{display:inline-block;margin-top:8px;padding:6px 16px;border-radius:8px;border:1px solid #3a3a5a;background:transparent;color:#888;font-size:.75rem;cursor:pointer}

  .mobile-quiz .mq-skip:hover{border-color:#7b68ee;color:#fff}

  @media(max-width:800px){

    .main,.modes,.load-bar,.fuzzy-hint,.bot,.sub,.tabs,.msg{display:none}
    h1{font-size:1.1rem}
    .mobile-quiz{display:flex}
  }

</style>

<h1>🦴 Cintura Pectoral — Arrastrá y Soltá</h1>

<div class="modes" id="modes">

<!-- Mobile Sequential Quiz -->

</div>

  <h2>🎉 ¡Completado!</h2>

  <p>Puntaje: <b id="mqFinalOk">0</b> / <span id="mqFinalTot">30</span></p>

<script src="zones.js"></script>

<script>

const VIEW_META = {

  posterior:            {img:"img/posterior.png",             title:"Post. Hueso"},

  anterior:             {img:"img/anterior.png",              title:"Ant. Hueso"},

  postMusculatura:      {img:"img/posterior_musculatura.png", title:"Post. Músculos"},

  antMusculatura:       {img:"img/anterior_musculatura.png",  title:"Ant. Músculos"}

};



// State

let allZones = {};

// Default to dropdown on mobile

let mode = (window.innerWidth < 800) ? 'dd-easy' : 'drag';

let selectedView = 'posterior';

let filled = {}, ok = 0;

let activeDropdown = null;


// Load zones



// Load zones: zones.js first (by viewport), localStorage as fallback
try { if(window.__ZONES__) { const _key = window.innerWidth < 800 ? "__mobile__" : "__desktop__"; allZones = window.__ZONES__[_key] || window.__ZONES__; } } catch(e){}
if(!allZones.posterior || allZones.posterior.length === 0) {
  try {
    const raw = localStorage.getItem(window.innerWidth < 800 ? 'escapula_zones_mobile' : 'escapula_zones');
    if(raw) allZones = JSON.parse(raw);
  } catch(e){}

}



// Modes

document.querySelectorAll('.modes button').forEach(b => {

  b.onclick = () => {

    document.querySelectorAll('.modes button').forEach(x => x.classList.remove('on'));

    b.classList.add('on');

    mode = b.dataset.mode;

    const hint = document.getElementById('fuzzyHint');

    const bank = document.getElementById('bankPanel');

    if(mode === 'drag') {

      hint.textContent = '';

      bank.style.display = '';

    } else if(mode === 'dd-easy') {

      hint.textContent = '✅ Escribí 2+ letras ✅ las opciones aparecen con fuzzy match';

      bank.style.display = 'none';

    } else {

      hint.textContent = '✅ Escribí el nombre exacto para encontrarlo';

      bank.style.display = 'none';

    }

    reset();

  };

});



// Fuzzy match: returns {match: bool, score: 0-1, indices: []}

function fuzzyMatch(query, target) {

  query = query.toLowerCase().trim();

  target = target.toLowerCase().trim();

  if(!query) return {match:true, score:0, indices:[]};

  if(query === target) return {match:true, score:1, indices:[...Array(target.length).keys()]};



  const indices = [];

  let qi = 0;

  for(let ti = 0; ti < target.length && qi < query.length; ti++) {

    if(query[qi] === target[ti]) { indices.push(ti); qi++; }

  }

  if(qi < query.length) return {match:false, score:0, indices:[]};

  const score = query.length / target.length;

  return {match:true, score, indices};

}



function fuzzyScore(query, target) {

  query = query.toLowerCase().trim();

  target = target.toLowerCase().trim();

  if(!query) return 0;

  if(query === target) return 1;

  // Levenshtein-based similarity

  const m = query.length, n = target.length;

  const dp = Array.from({length:m+1}, (_,i) => i);

  for(let j=1;j<=n;j++){

    let prev=dp[0];dp[0]=j;

    for(let i=1;i<=m;i++){

      const tmp=dp[i];

      dp[i]=query[i-1]===target[j-1]?prev:Math.min(prev,dp[i],dp[i-1])+1;

      prev=tmp;

    }

  }

  const dist = dp[m];

  return Math.max(0, 1 - dist / Math.max(m, n));

}



// Close dropdown on outside click

document.addEventListener('click', e => {

  if(activeDropdown && !e.target.closest('.dz-dd')) {

    activeDropdown.classList.remove('open');

    activeDropdown = null;

  }

});



function getTargets(viewKey) {

  const zones = allZones[viewKey] || [];

  return zones.map((z,i) => ({

    id: viewKey+'_'+i, label: z.label, x: z.x, y: z.y, w: z.w||130, h: z.h||28, dir: z.dir||'none'

  }));

}



// Build tabs

function buildTabs() {

  const tabsEl = document.getElementById('tabs');

  tabsEl.innerHTML = '';

  Object.keys(VIEW_META).forEach(k => {

    const count = (allZones[k]||[]).length;

    const b = document.createElement('button');

    b.className = 'tab' + (k===selectedView?' on':'');

    b.textContent = VIEW_META[k].title + (count>0 ? ` (${count})` : '');

    b.onclick = () => {

      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));

      b.classList.add('on'); selectedView = k; reset();

    };

    tabsEl.appendChild(b);

  });

}



document.getElementById('rb').onclick = reset;

function reset(){filled={};ok=0;render();}



function render() {

  buildTabs();

  const meta = VIEW_META[selectedView];

  const targets = getTargets(selectedView);

  const canvas = document.getElementById('canvas');

  canvas.innerHTML = '<img src="'+meta.img+'" alt="'+meta.title+'">';

  const msgEl = document.getElementById('msg');



  if(targets.length === 0) {

    msgEl.textContent = '⚠️ Sin zonas para esta vista — cargá un JSON';

  } else {

    msgEl.textContent = '✅ '+targets.length+' zonas cargadas';

  }



  if(mode === 'drag') {

    renderDrag(canvas, targets);

  } else {

    renderDropdown(canvas, targets);

  }

  score();

}



// ===== DRAG MODE =====

function renderDrag(canvas, targets) {

  document.getElementById('bankPanel').style.display = '';

  targets.forEach(t => {

    const d = document.createElement('div');

    d.className = 'dz'; d.dataset.id = t.id; d.dataset.answer = t.label;

    d.style.left = t.x+'%'; d.style.top = t.y+'%';

    // Scale zone: up to 43% of image but max 130px

    const zw = Math.max(80, (t.w||130));

    const zh = Math.max(20, (t.h||28));

    d.style.width = 'min(43%, '+zw+'px)';

    d.style.height = 'min(9.3%, '+zh+'px)';

    const fs = Math.max(0.42, Math.min(0.65, zw/t.label.length*0.55));

    d.style.fontSize = fs+'rem';

    d.textContent = '?';

    d.addEventListener('dragover', e => {e.preventDefault();d.classList.add('over');});

    d.addEventListener('dragleave', () => d.classList.remove('over'));

    d.addEventListener('drop', e => {

      e.preventDefault(); d.classList.remove('over');

      if(d.classList.contains('ok')) return;

      const lbl = e.dataTransfer.getData('text/plain');

      if(lbl === t.label) {

        d.classList.add('ok'); d.textContent = lbl; filled[t.id] = lbl; ok++;

        const w = document.getElementById('wb').querySelector(`.w[data-lbl="${CSS.escape(lbl)}"]`);

        if(w) w.classList.add('used'); score();

      } else {

        d.classList.add('wrong'); d.textContent = '❌';

        setTimeout(()=>{d.classList.remove('wrong');d.textContent='?';},500);

      }

    });

    // Arrow tip via parent class
    if(t.dir && t.dir !== 'none') {
      d.classList.add('has-arr', 'arr-'+t.dir);
    }

    canvas.appendChild(d);

  });

  // Word bank

  const lbls = targets.map(t => t.label); shuffle(lbls);

  const wb = document.getElementById('wb'); wb.innerHTML = '';

  lbls.forEach(lbl => {

    const w = document.createElement('div'); w.className = 'w'; w.draggable = true;

    w.dataset.lbl = lbl; w.textContent = lbl;

    w.addEventListener('dragstart', e => {

      e.dataTransfer.setData('text/plain', lbl);

      e.dataTransfer.effectAllowed = 'move';

      setTimeout(()=>w.classList.add('drg'),0);

    });

    w.addEventListener('dragend', () => w.classList.remove('drg'));

    wb.appendChild(w);

  });

}

function renderDropdown(canvas, targets) {

  document.getElementById('bankPanel').style.display = 'none';

  const allLabels = targets.map(t => t.label);



  targets.forEach(t => {

    const wrap = document.createElement('div');

    wrap.className = 'dz-dd'; wrap.dataset.id = t.id; wrap.dataset.answer = t.label;

    wrap.style.left = t.x+'%'; wrap.style.top = t.y+'%';

    wrap.style.width = (t.w||130)+'px'; wrap.style.height = (t.h||28)+'px';



    const label = document.createElement('div');

    label.className = 'zone-label';

    // Make label fill the wrapper width

    label.style.width = '100%';

    label.style.minWidth = '0';

    label.style.height = '100%';

    label.style.display = 'flex';

    label.style.alignItems = 'center';

    label.style.justifyContent = 'center';

    const fs = Math.max(0.45, Math.min(0.65, (t.w||130)/t.label.length*0.55));

    label.style.fontSize = fs+'rem';

    label.textContent = '?';

    label.onclick = (e) => {

      e.stopPropagation();

      if(wrap.classList.contains('ok')) return;

      // Close previous

      if(activeDropdown && activeDropdown !== dd) {

        activeDropdown.classList.remove('open');

      }

      dd.classList.toggle('open');

      activeDropdown = dd.classList.contains('open') ? dd : null;

      if(activeDropdown) { inp.value=''; filterOpts('', allLabels, dd); inp.focus(); }

    };

    wrap.appendChild(label);



    const dd = document.createElement('div');

    dd.className = 'dropdown';



    const inp = document.createElement('input');

    inp.type = 'text'; inp.placeholder = 'Escribí para buscar...';

    inp.onclick = e => e.stopPropagation();

    inp.oninput = () => filterOpts(inp.value, allLabels, dd);

    dd.appendChild(inp);



    const opts = document.createElement('div');

    opts.className = 'opts';

    allLabels.forEach(lbl => {

      const opt = document.createElement('div');

      opt.className = 'opt'; opt.dataset.label = lbl; opt.textContent = lbl;

      opt.onclick = (e) => {

        e.stopPropagation();

        if(lbl === t.label) {

          // Correct

          wrap.classList.add('ok');

          label.textContent = lbl; label.style.fontWeight = '700';

          filled[t.id] = lbl; ok++;

          dd.classList.remove('open'); activeDropdown = null;

          score();

        } else {

          // Wrong

          wrap.classList.add('wrong');

          setTimeout(() => wrap.classList.remove('wrong'), 400);

        }

      };

      opts.appendChild(opt);

    });

    dd.appendChild(opts);

    wrap.appendChild(dd);

    // Arrow tip via parent class
    if(t.dir && t.dir !== 'none') {
      wrap.classList.add('has-arr', 'arr-'+t.dir);
    }

    canvas.appendChild(wrap);

  });

}



function filterOpts(query, allLabels, dd) {

  const opts = dd.querySelectorAll('.opt');

  const threshold = mode === 'dd-hard' ? 1.0 : 0.7;

  let anyMatch = false;



  if(!query.trim()) {

    // Don't show anything ✅ need to type at least 70% of the name

    opts.forEach(o => { o.classList.add('hidden'); });

    let nm = dd.querySelector('.no-match');

    if(!nm) { nm = document.createElement('div'); nm.className = 'no-match'; dd.querySelector('.opts').appendChild(nm); }

    nm.textContent = 'Escribí al menos el 70% del nombre para ver opciones';

    return;

  }



  const queryLen = query.trim().length;



  opts.forEach(o => {

    const lbl = o.dataset.label;



    if(mode === 'dd-easy') {

      // Easy: need at least 2 chars, letters must appear in order in the name

      if(queryLen < 2) {

        o.classList.add('hidden');

        return;

      }

      const q = query.toLowerCase();

      const t = lbl.toLowerCase();

      // Check if query chars appear in sequence (subsequence match)

      let qi = 0;

      for(let ti = 0; ti < t.length && qi < q.length; ti++) {

        if(q[qi] === t[ti]) qi++;

      }

      const show = qi === q.length;

      o.classList.toggle('hidden', !show);

      if(show) {

        anyMatch = true;

        const idx = t.indexOf(q);

        if(idx >= 0) {

          o.innerHTML = lbl.slice(0,idx) + '<span class="match">' + lbl.slice(idx, idx+queryLen) + '</span>' + lbl.slice(idx+queryLen);

        } else {

          o.innerHTML = lbl;

        }

      }

    } else {

      // Hard: need at least 70% of the label length

      const requiredLen = Math.ceil(lbl.length * 0.7);

      if(queryLen < requiredLen) {

        o.classList.add('hidden');

        return;

      }

      const score = fuzzyScore(query, lbl);

      const show = score >= 0.7;

      o.classList.toggle('hidden', !show);

      if(show) {

        anyMatch = true;

        const idx = lbl.toLowerCase().indexOf(query.toLowerCase());

        if(idx >= 0) {

          o.innerHTML = lbl.slice(0,idx) + '<span class="match">' + lbl.slice(idx, idx+queryLen) + '</span>' + lbl.slice(idx+queryLen);

        } else {

          o.innerHTML = lbl;

        }

      }

    }

  });



  // No match message

  let nm = dd.querySelector('.no-match');

  if(!anyMatch) {

    if(!nm) {

      nm = document.createElement('div'); nm.className = 'no-match';

      dd.querySelector('.opts').appendChild(nm);

    }

    nm.textContent = 'Ninguna coincidencia ✅ probá con otras letras';

  } else if(nm) {

    nm.remove();

  }

}

    if(query.length < 2) return false;

    let qi = 0;
