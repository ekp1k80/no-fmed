<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - FMED 1ro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <style>
        body { 
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            max-width: 800px;
            margin: 2rem auto;
        }
        .option-button {
            background-color: #f0f9ff;
            color: #1f2937;
            padding: 1rem 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            border: 2px solid #e0f2fe;
            font-size: 1rem;
        }
        .option-button:hover:not(:disabled) {
            background-color: #e0f2fe;
            border-color: #7dd3fc;
            transform: translateX(4px);
        }
        .option-button.correct {
            background-color: #d1fae5;
            border-color: #34d399;
        }
        .option-button.incorrect {
            background-color: #fee2e2;
            border-color: #ef4444;
        }
        .option-button:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        .feedback-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            display: none;
        }
        .feedback-message.correct {
            background-color: #d1fae5;
            color: #065f46;
            display: block;
        }
        .feedback-message.incorrect {
            background-color: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .hint-text {
            font-style: italic;
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: #f9fafb;
            border-radius: 0.5rem;
            border-left: 3px solid #9ca3af;
        }
        .progress-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .results-screen {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        .results-screen.visible {
            display: block;
        }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-3xl mx-auto">
        <a href="index.html" class="inline-flex items-center gap-2 text-gray-500 hover:text-gray-800 mb-4">
            ← Volver al menú
        </a>
        
        <div id="quiz-container" class="quiz-container">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-4">
                <div class="flex flex-wrap items-center gap-2">
                    <span id="materia-badge" class="bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-full whitespace-nowrap">Anatomía</span>
                    <span id="parte-badge" class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-full whitespace-nowrap">Parte 1</span>
                </div>
                <span id="counter" class="text-gray-500 text-sm font-medium whitespace-nowrap">1 / 10</span>
            </div>
            
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>

            <div id="question-display">
                <p id="question-text" class="text-xl font-semibold text-gray-800 mb-4"></p>
                <div id="options-container" class="flex flex-col gap-3"></div>
                <p id="hint-text" class="hint-text" style="display: none;"></p>
                <div id="feedback-message" class="feedback-message"></div>
                <button id="next-button" class="mt-4 bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-medium transition hidden">
                    Siguiente →
                </button>
            </div>

            <div id="results-screen" class="results-screen">
                <div id="score-circle" class="score-circle">0%</div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Quiz Completado!</h2>
                <p class="text-gray-600 mb-4">
                    Tu puntuación: <span id="final-score"></span> de <span id="total-questions"></span>
                </p>
                <p id="feedback-text" class="text-gray-500 text-sm mb-6"></p>
                <div class="flex gap-3 justify-center">
                    <button onclick="location.reload()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg transition">
                        Reintentar
                    </button>
                    <a href="index.html" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg transition">
                        Menú
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Obtener parámetros de URL
        const urlParams = new URLSearchParams(window.location.search);
        const materiaKey = urlParams.get('materia') || 'anato-tegumento';
        const parteId = parseInt(urlParams.get('parte')) || 1;
        
        // Obtener datos del quiz
        const materia = quizzes[materiaKey];
        if (!materia) {
            alert('Materia no encontrada');
            window.location.href = 'index.html';
        }
        
        const parte = materia.partes.find(p => p.id === parteId);
        if (!parte) {
            alert('Parte no encontrada');
            window.location.href = 'index.html';
        }
        
        // Preparar preguntas (mezclar)
        let quizQuestions = [...parte.data];
        if (quizQuestions.length === 0) {
            document.getElementById('question-display').innerHTML = 
                '<p class="text-center text-gray-500 py-8">No hay preguntas disponibles para esta parte aún.</p>';
        }
        quizQuestions.sort(() => Math.random() - 0.5);
        
        // Variables
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;
        
        // Actualizar UI inicial
        document.getElementById('materia-badge').textContent = materia.titulo;
        document.getElementById('parte-badge').textContent = `Parte ${parte.id}: ${parte.nombre}`;
        document.getElementById('counter').textContent = `1 / ${quizQuestions.length}`;
        
        // Mostrar primera pregunta
        if (quizQuestions.length > 0) {
            displayQuestion();
        }
        
        function displayQuestion() {
            const q = quizQuestions[currentQuestionIndex];
            
            // Progress
            const progress = ((currentQuestionIndex) / quizQuestions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('counter').textContent = `${currentQuestionIndex + 1} / ${quizQuestions.length}`;
            
            // Pregunta
            document.getElementById('question-text').textContent = q.question;
            
            // Opciones mezcladas
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-button';
                btn.textContent = opt.text;
                btn.dataset.correct = opt.isCorrect;
                btn.dataset.rationale = opt.rationale || '';
                btn.onclick = () => selectOption(btn, opt.isCorrect, opt.rationale);
                container.appendChild(btn);
            });
            
            // Pista
            const hintEl = document.getElementById('hint-text');
            if (q.hint) {
                hintEl.textContent = '💡 ' + q.hint;
                hintEl.style.display = 'block';
            } else {
                hintEl.style.display = 'none';
            }
            
            // Reset
            document.getElementById('feedback-message').style.display = 'none';
            document.getElementById('feedback-message').className = 'feedback-message';
            document.getElementById('next-button').classList.add('hidden');
            
            selectedOption = null;
        }
        
        function selectOption(button, isCorrect, rationale) {
            if (selectedOption !== null) return;
            
            selectedOption = button;
            const feedback = document.getElementById('feedback-message');
            const nextBtn = document.getElementById('next-button');
            
            // Deshabilitar todos
            document.querySelectorAll('.option-button').forEach(btn => {
                btn.disabled = true;
                if (btn.dataset.correct === 'true') {
                    btn.classList.add('correct');
                }
            });
            
            if (isCorrect) {
                button.classList.add('correct');
                feedback.innerHTML = '✅ <strong>¡Correcto!</strong>';
                feedback.classList.add('correct');
                score++;
            } else {
                button.classList.add('incorrect');
                feedback.innerHTML = `❌ <strong>Incorrecto</strong><br><span class="text-sm">${rationale || 'Revisa la opción marcada en verde'}</span>`;
                feedback.classList.add('incorrect');
            }
            
            feedback.style.display = 'block';
            nextBtn.classList.remove('hidden');
        }
        
        document.getElementById('next-button').addEventListener('click', () => {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizQuestions.length) {
                displayQuestion();
            } else {
                showResults();
            }
        });
        
        function showResults() {
            document.getElementById('question-display').style.display = 'none';
            document.getElementById('results-screen').classList.add('visible');
            
            const percentage = Math.round((score / quizQuestions.length) * 100);
            document.getElementById('final-score').textContent = score;
            document.getElementById('total-questions').textContent = quizQuestions.length;
            document.getElementById('score-circle').textContent = percentage + '%';
            
            let feedback = '';
            if (percentage >= 80) feedback = '🎉 ¡Excelente! Dominás el tema';
            else if (percentage >= 60) feedback = '👍 Bien, pero hay que repasar algunas cosas';
            else feedback = '📚 Necesitás estudiar más este tema';
            document.getElementById('feedback-text').textContent = feedback;
        }
    </script>
</body>
</html>
