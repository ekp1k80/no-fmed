<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMED 1ro - Cuestionarios de Anatomía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <style>
        body { 
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .materia-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .materia-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .parte-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🧠 FMED 1ro</h1>
            <p class="text-gray-600">Cuestionarios de Anatomía por tema</p>
        </div>

        <!-- Lista de Materias -->
        <div id="materias-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Se genera dinámicamente -->
        </div>
    </div>

    <script>
        function renderMaterias() {
            const container = document.getElementById('materias-container');
            
            Object.keys(quizzes).forEach(key => {
                const materia = quizzes[key];
                const totalPreguntas = materia.partes.reduce((acc, p) => acc + p.preguntas, 0);
                
                const card = document.createElement('div');
                card.className = 'materia-card p-6';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800 mb-1">${materia.titulo}</h2>
                            <p class="text-gray-500 text-sm">${materia.descripcion}</p>
                        </div>
                        <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">
                            ${totalPreguntas} preg
                        </span>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 mt-4">
                        ${materia.partes.map(parte => `
                            <button onclick="window.location.href='quiz.html?materia=${key}&parte=${parte.id}'" 
                                    class="text-left p-3 rounded-lg bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-200 transition-all">
                                <span class="parte-tag bg-blue-100 text-blue-700 mb-1">Parte ${parte.id}</span>
                                <p class="text-xs text-gray-600 mt-1 truncate">${parte.nombre}</p>
                                <p class="text-xs text-gray-400">${parte.preguntas} preg</p>
                            </button>
                        `).join('')}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        renderMaterias();
    </script>
</body>
</html>
